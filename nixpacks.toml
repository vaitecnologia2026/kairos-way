[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "npx prisma generate",
  "npx tsc --outDir dist --module commonjs --target ES2020 --esModuleInterop true --skipLibCheck true --noEmitOnError false --resolveJsonModule true || echo 'Build completed with warnings'"
]

[start]
cmd = "node dist/app.js"
